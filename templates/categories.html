<!-- Shows all categories from the database -->
{% extends "base.html" %}

{% block content %}
<h1>Choose a Category</h1>
<p>Choose a category and difficulty. Every quiz has five random questions.</p>

<div class="category-grid">
    {% for category in categories %}
        <div class="card">
            <h2>{{ category.name }}</h2>
            <div class="difficulty-buttons">
                {% for difficulty in difficulties %}
                    <a class="small-button" href="{{ url_for('start_quiz', category_id=category.id, difficulty=difficulty) }}">
                        {{ difficulty.title() }}
                    </a>
                {% endfor %}
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
